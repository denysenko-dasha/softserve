name: CI/CD Pipeline


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

jobs:
  
  hello_job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello Message
        run: echo "Hello, GitHub Actions!"

  
  test_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      
      - name: Run tests with coverage
        run: |
          python -m pytest --cov=myapp tests/ --cov-fail-under=70

      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
        if: always() 

  
  build_job:
    needs: test_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Application Placeholder
        run: |
          echo "Building the application..."
          

      
      - name: Add status badge to README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          if ! grep -q "actions/workflows/workflow.yml/badge.svg" README.md; then
            echo "Add badg у README.md"
            
            BADGE="![CI/CD Status](https://github.com/${{ github.repository }}/actions/workflows/workflow.yml/badge.svg)\n\n"
            
            echo -e "$BADGE$(cat README.md 2>/dev/null || echo '# Project')" > README.md
            
            
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add README.md
            git commit -m "chore: add build status badge to README [skip ci]"
            git push
          else
            echo "already README.md."
          fi